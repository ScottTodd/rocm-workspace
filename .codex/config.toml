# Project-local Codex defaults for this meta-workspace.
#
# Codex loads project .codex/config.toml only after the project is trusted.
# Restart Codex after changing this file so the sandbox is recreated with the
# updated writable roots.

sandbox_mode = "workspace-write"
approval_policy = "on-request"

[windows]
sandbox = "elevated"

[shell_environment_policy]
# scripts/codex.bat activates the workspace venv before launching Codex. Keep
# the inherited environment narrow while preserving the variables needed for
# Python, Windows process startup, and common developer tools.
inherit = "all"
include_only = [
  "PATH",
  "PATHEXT",
  "VIRTUAL_ENV",
  "VIRTUAL_ENV_PROMPT",
  "COMSPEC",
  "SystemDrive",
  "SystemRoot",
  "WINDIR",
  "TEMP",
  "TMP",
  "USERPROFILE",
  "APPDATA",
  "LOCALAPPDATA",
  "ProgramData",
  "ProgramFiles",
  "ProgramFiles(x86)",
  "ProgramW6432",
  "PROCESSOR_ARCHITECTURE",
  "PROCESSOR_IDENTIFIER",
  "PROCESSOR_LEVEL",
  "PROCESSOR_REVISION",
  "NUMBER_OF_PROCESSORS",
]

[sandbox_workspace_write]
# Keep these paths aligned with directory-map.md.
writable_roots = [
  "D:/projects/TheRock",
  "D:/projects/rockrel",
  "D:/scratch/codex",
]
