# ============================================================
# SKETCH: Multi-arch PyTorch release workflow architecture
# This is NOT runnable YAML. It shows the data flow between
# jobs and workflows with minimal detail.
# ============================================================

# ============================================================
# File 1: multi_arch_release_linux_pytorch_wheels.yml
# (orchestrator -- owns the build matrix, dispatches per-cell)
# ============================================================
# Triggered by: multi_arch_release_linux.yml (via workflow_dispatch)
# Also triggerable directly for developer use

on:
  workflow_call:
    inputs:
      amdgpu_families: {type: string, required: true}
      rocm_version: {type: string, required: true}
      rocm_package_find_links_url: {type: string, required: true}
      release_type: {type: string, required: true}
      ref: {type: string}
      # Developer overrides (narrow what gets built/tested):
      python_versions:
        description: "Space-separated (empty = all per policy)"
        type: string
        default: ""
      pytorch_git_refs:
        description: "Space-separated (empty = all per policy)"
        type: string
        default: ""
      test_families_override:
        description: "Semicolon-separated families to test (empty = all with runners)"
        type: string
        default: ""
      # TODO: test_level_override (smoke/full/none) for pre-stable validation

jobs:
  generate_manifest:
    runs-on: ubuntu-24.04
    outputs:
      manifest_s3_prefix: "..."
      build_matrix: "..."  # JSON: [{pytorch_git_ref, python_version}, ...]
    steps:
      - # Checkout TheRock (for scripts)
      - # generate_pytorch_manifest_upfront.py:
        #   - resolve pytorch refs -> commits (GitHub API)
        #   - fetch version.txt per repo at resolved commit
        #   - compute versions (base + rocm suffix)
        #   - write manifest JSONs to S3
        #   - compute build matrix (pytorch_git_ref x python_version)
        #     with exclusions (e.g. no py3.14 for torch 2.8)
        #   - apply python_versions / pytorch_git_refs overrides if provided

  build_and_test:
    needs: [generate_manifest]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate_manifest.outputs.build_matrix) }}
    uses: ./.github/workflows/build_and_test_multiarch_pytorch.yml
    secrets: inherit
    with:
      pytorch_git_ref: ${{ matrix.pytorch_git_ref }}
      python_version: ${{ matrix.python_version }}
      manifest_s3_prefix: ${{ needs.generate_manifest.outputs.manifest_s3_prefix }}
      amdgpu_families: ${{ inputs.amdgpu_families }}
      rocm_version: ${{ inputs.rocm_version }}
      rocm_package_find_links_url: ${{ inputs.rocm_package_find_links_url }}
      release_type: ${{ inputs.release_type }}
      ref: ${{ inputs.ref }}
      test_families_override: ${{ inputs.test_families_override }}


# ============================================================
# File 2: build_and_test_multiarch_pytorch.yml
# (reusable per-cell workflow -- one per pytorch_ref x python_version)
# Also dispatchable independently for debugging.
# ============================================================

on:
  workflow_call:
    inputs:
      pytorch_git_ref: {type: string, required: true}
      python_version: {type: string, required: true}
      manifest_s3_prefix: {type: string}
      amdgpu_families: {type: string, required: true}
      rocm_version: {type: string, required: true}
      rocm_package_find_links_url: {type: string, required: true}
      release_type: {type: string, required: true}
      ref: {type: string}
      test_families_override: {type: string, default: ""}
      # TODO: test_level_override: {type: string, default: ""}

jobs:
  build:
    runs-on: azure-linux-scale-rocm
    outputs:
      torch_version: "..."    # from manifest or write_torch_versions.py
      package_index_url: "..." # CDN URL for installed packages
    steps:
      - # Checkout TheRock
      - # Download manifest from S3 (or generate if not provided,
        #   for standalone dispatch without orchestrator)
      - # Checkout pytorch repos at manifest commit SHAs
        #   (checkout_from_manifest.py -> delegates to pytorch_*_repo.py)
      - # Build wheels (all GPU targets via expand_amdgpu_families.py)
      - # kpack-split (host + device wheels)
      - # Upload wheels to S3 v4/whl (publish_pytorch_to_release_bucket.py)

  generate_test_matrix:
    runs-on: ubuntu-24.04
    outputs:
      test_matrix: "..."  # JSON: [{amdgpu_family, test_runs_on}, ...]
    steps:
      - # Checkout TheRock (for scripts)
      - # configure_pytorch_test_matrix.py:
        #   --amdgpu-families (from inputs)
        #   --platform linux
        #   --test-families-override (from inputs, optional)
        #   Reads amdgpu_family_matrix.py for runner labels.
        #   Drops families with empty test-runs-on.
        #   Outputs JSON array to GITHUB_OUTPUT.
        #   TODO: accept --test-level-override, output test_level per entry

  test:
    needs: [build, generate_test_matrix]
    if: ${{ needs.generate_test_matrix.outputs.test_matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        family_info: ${{ fromJSON(needs.generate_test_matrix.outputs.test_matrix) }}
    uses: ./.github/workflows/test_pytorch_wheels.yml
    with:
      amdgpu_family: ${{ matrix.family_info.amdgpu_family }}
      test_runs_on: ${{ matrix.family_info.test_runs_on }}
      package_index_url: ${{ needs.build.outputs.package_index_url }}
      torch_version: ${{ needs.build.outputs.torch_version }}
      pytorch_git_ref: ${{ inputs.pytorch_git_ref }}
      python_version: ${{ inputs.python_version }}
      multi_arch: true
    # TODO: conditionally call test_pytorch_wheels_full.yml based on
    #   matrix.family_info.test_level == "full"


# ============================================================
# Data flow summary
# ============================================================
#
# multi_arch_release_linux.yml (parent)
#   |  dispatch (amdgpu_families, rocm_version, find_links_url, release_type)
#   v
# File 1: orchestrator
#   |
#   +-> generate_manifest
#   |     inputs: pytorch_git_refs, rocm_version, python_versions (overrides)
#   |     outputs: manifest_s3_prefix, build_matrix
#   |
#   +-> build_and_test (matrix: pytorch_ref x python_version)
#         |  workflow_call (per cell)
#         v
#       File 2: per-cell reusable workflow
#         |
#         +-> build
#         |     inputs: manifest (from S3), amdgpu_families, rocm_version
#         |     outputs: torch_version, package_index_url
#         |
#         +-> generate_test_matrix (parallel with build)
#         |     inputs: amdgpu_families, test_families_override
#         |     outputs: test_matrix [{amdgpu_family, test_runs_on}]
#         |
#         +-> test (matrix: family, needs: [build, generate_test_matrix])
#               calls: test_pytorch_wheels.yml
#               inputs: family, runner, torch_version, index_url, multi_arch=true
